<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COBOL.NEWS — comp.lang.cobol Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <a href="#/" class="logo" aria-label="Home">
      <span class="logo-bracket">[</span>COBOL<span class="logo-dot">.</span>NEWS<span class="logo-bracket">]</span>
    </a>
    <form class="search-form" id="search-form">
      <input
        type="search"
        id="search-input"
        placeholder="Search 24k threads…"
        autocomplete="off"
        spellcheck="false"
      />
      <button type="submit">Search</button>
    </form>
    <nav class="nav-links">
      <a href="#/stats">Stats</a>
      <a href="#/authors">Authors</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav>
        <div class="sidebar-section">
          <div class="sidebar-label">Sort</div>
          <a href="#/" class="nav-link" data-route="hot">Hot</a>
          <a href="#/new" class="nav-link" data-route="new">New</a>
          <a href="#/popular" class="nav-link" data-route="popular">Most Discussed</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Years</div>
          <div id="year-nav" class="nav-group">
            <div class="nav-placeholder">Loading…</div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Topics</div>
          <div id="topic-nav" class="nav-group">
            <div class="nav-placeholder">Loading…</div>
          </div>
        </div>
      </nav>
    </aside>

    <main id="content" class="content">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Loading archive…</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
